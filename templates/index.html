<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态环境下道路桩号视觉检测与文字识别软件 V1.0</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <header class="header">
            <h1><i class="fas fa-road"></i> 动态环境下道路桩号视觉检测与文字识别软件 V1.0</h1>
            <div class="header-actions">
                <span class="status">系统就绪</span>
            </div>
        </header>

        <!-- 主内容 -->
        <div class="main">
            <!-- 左侧：上传和控制 -->
            <div class="left-panel">
                <!-- 文件上传 -->
                <div class="card">
                    <div class="card-header">文件上传</div>
                    <div class="card-body">
                        <div class="upload-area" id="uploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>拖放文件到此处或点击选择</p>
                            <p class="hint">支持图片（JPG/PNG/BMP）和视频（MP4/AVI）</p>
                            <input type="file" id="fileInput" accept="image/*,video/*" hidden>
                        </div>
                        <div class="file-info" id="fileInfo" style="display:none;">
                            <div class="info-row">
                                <span>文件名：</span>
                                <span id="fileName">-</span>
                            </div>
                            <div class="info-row">
                                <span>类型：</span>
                                <span id="fileType">-</span>
                            </div>
                            <div class="info-row">
                                <span>大小：</span>
                                <span id="fileSize">-</span>
                            </div>
                            <button class="btn btn-sm" onclick="clearFile()">清除文件</button>
                        </div>
                    </div>
                </div>

                <!-- 参数设置 -->
                <div class="card">
                    <div class="card-header">参数设置</div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>检测灵敏度：</label>
                            <div class="range-group">
                                <input type="range" id="sensitivity" min="1" max="100" value="50">
                                <span id="sensitivityVal">50%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>识别语言：</label>
                            <select id="language">
                                <option value="ch_sim">中文</option>
                                <option value="en">英文</option>
                                <option value="both">中英文混合</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>视频采样间隔（帧）：</label>
                            <input type="number" id="sampleRate" value="30" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>预处理选项：</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" id="preDenoise" checked> 高斯去噪</label>
                                <label><input type="checkbox" id="preEnhance" checked> 对比度增强</label>
                                <label><input type="checkbox" id="preBinary"> 二值化处理</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 检测控制 -->
                <div class="card">
                    <div class="card-header">检测控制</div>
                    <div class="card-body">
                        <div class="btn-group">
                            <button class="btn btn-primary" id="btnStart" onclick="startDetection()" disabled>
                                <i class="fas fa-play"></i> 开始检测
                            </button>
                            <button class="btn btn-warning" id="btnPause" onclick="pauseDetection()" disabled>
                                <i class="fas fa-pause"></i> 暂停
                            </button>
                            <button class="btn btn-danger" id="btnStop" onclick="stopDetection()" disabled>
                                <i class="fas fa-stop"></i> 停止
                            </button>
                        </div>
                        <div class="progress">
                            <div class="progress-bar" id="progressBar"></div>
                            <span class="progress-text" id="progressText">就绪</span>
                        </div>
                    </div>
                </div>

                <!-- 数据管理 -->
                <div class="card">
                    <div class="card-header">数据管理</div>
                    <div class="card-body">
                        <div class="btn-group">
                            <button class="btn btn-success" onclick="exportData('json')">
                                <i class="fas fa-file-export"></i> 导出JSON
                            </button>
                            <button class="btn btn-success" onclick="exportData('csv')">
                                <i class="fas fa-file-csv"></i> 导出CSV
                            </button>
                        </div>
                        <div class="btn-group" style="margin-top:10px;">
                            <button class="btn btn-info" onclick="importData()">
                                <i class="fas fa-file-import"></i> 导入数据
                            </button>
                            <button class="btn btn-secondary" onclick="clearAllData()">
                                <i class="fas fa-trash"></i> 清空数据
                            </button>
                        </div>
                        <input type="file" id="importFile" accept=".json,.csv" hidden>
                    </div>
                </div>
            </div>

            <!-- 右侧：结果和历史 -->
            <div class="right-panel">
                <!-- 检测结果 -->
                <div class="card">
                    <div class="card-header">
                        检测结果
                        <button class="btn btn-sm btn-primary" onclick="downloadResult()" id="btnDownload" style="display:none;">
                            <i class="fas fa-download"></i> 下载结果图
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="result-image" id="resultImage" style="display:none;">
                            <img id="resultImg" src="" alt="检测结果">
                        </div>
                        <div class="result-info">
                            <table class="result-table">
                                <tr>
                                    <td class="label">识别桩号：</td>
                                    <td id="resultPile" class="value">-</td>
                                </tr>
                                <tr>
                                    <td class="label">识别文字：</td>
                                    <td id="resultText" class="value">-</td>
                                </tr>
                                <tr>
                                    <td class="label">检测置信度：</td>
                                    <td id="resultConf" class="value">-</td>
                                </tr>
                                <tr>
                                    <td class="label">检测区域：</td>
                                    <td id="resultRegion" class="value">-</td>
                                </tr>
                                <tr>
                                    <td class="label">处理状态：</td>
                                    <td id="resultStatus" class="value">等待中</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="card">
                    <div class="card-header">统计信息</div>
                    <div class="card-body">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-num" id="statTotal">0</div>
                                <div class="stat-label">总检测数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-num" id="statSuccess">0</div>
                                <div class="stat-label">成功识别</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-num" id="statRate">0%</div>
                                <div class="stat-label">识别率</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-num" id="statToday">0</div>
                                <div class="stat-label">今日检测</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 检测历史 -->
                <div class="card">
                    <div class="card-header">
                        检测历史
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="搜索桩号或文件名...">
                            <button class="btn btn-sm" onclick="searchHistory()">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="history-filter">
                            <select id="historyFilter" onchange="filterHistory()">
                                <option value="all">全部</option>
                                <option value="image">仅图片</option>
                                <option value="video">仅视频</option>
                            </select>
                        </div>
                        <div class="history-list" id="historyList">
                            <p class="empty">暂无检测记录</p>
                        </div>
                        <div class="history-actions">
                            <button class="btn btn-sm" onclick="loadHistory()">刷新</button>
                            <button class="btn btn-sm btn-danger" onclick="clearHistory()">清空历史</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading" id="loading" style="display:none;">
        <div class="loading-content">
            <i class="fas fa-spinner fa-spin"></i>
            <p id="loadingText">处理中...</p>
        </div>
    </div>

    <!-- 消息提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
